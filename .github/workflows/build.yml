name: Build

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: espressif/idf:v5.1.1

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Create credential placeholders for CI
        run: |
          printf '#ifndef WIFI_CREDENTIALS_H\n#define WIFI_CREDENTIALS_H\n#define WIFI_SSID "ci"\n#define WIFI_PASSWORD "ci"\n#endif\n' > main/wifi_credentials.h
          printf '#ifndef FIREBASE_CONFIG_H\n#define FIREBASE_CONFIG_H\n#define FIREBASE_DATABASE_URL "https://placeholder.firebaseio.com"\n#endif\n' > main/firebase_config.h

      - name: Build firmware
        run: |
          . $IDF_PATH/export.sh
          idf.py build

      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: esp-eye-firmware
          path: |
            build/esp-eye.bin
            build/bootloader/bootloader.bin
            build/partition_table/partition-table.bin

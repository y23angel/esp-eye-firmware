name: Build

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: espressif/idf:v5.1.1

    steps:
      - name: Checkout code
        uses: actions/checkout@v3
        with:
          submodules: recursive

      - name: Build firmware
        run: |
          . $IDF_PATH/export.sh
          idf.py build

      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: esp-eye-firmware
          path: |
            build/esp-eye.bin
            build/bootloader/bootloader.bin
            build/partition_table/partition-table.bin
